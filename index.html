<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>逃走中 Nexis ルーム制</title>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>
body{font-family:sans-serif;background:#111;color:white;text-align:center;}
#log{height:180px;overflow:auto;border:1px solid #555;text-align:left;}
button,input{padding:10px;margin:5px;}
#status{position:fixed;top:10px;right:10px;padding:8px;border-radius:8px;}
.connected{background:green;}
.disconnected{background:red;}
</style>
</head>
<body>

<h2 id="status">未接続</h2>

<h1 id="timer">--:--</h1>
<h3 id="count">残り人数: 0</h3>

<div id="log"></div>

<hr>

<!-- モード -->
<button onclick="createRoom()">ホスト（部屋作成）</button>
<button onclick="joinUI()">参加者（入室）</button>

<div id="roomBox" style="display:none;">
  <input id="roomInput" placeholder="ルームコード">
  <button onclick="joinRoom()">入室</button>
</div>

<div id="roomDisplay"></div>

<!-- 名前 -->
<div id="nameBox" style="display:none;">
  <input id="nameInput" placeholder="名前">
  <button onclick="setName()">決定</button>
</div>

<!-- ホスト -->
<div id="hostUI" style="display:none;">
  <input id="timeInput" type="number" placeholder="秒">
  <button onclick="startGame()">開始</button>

  <br><br>
  <input id="logInput" placeholder="ログ">
  <button onclick="sendLog()">送信</button>
</div>

<!-- プレイヤー -->
<div id="playerUI" style="display:none;">
  <button onclick="capture()">確保</button>
  <button onclick="revive()">復活</button>
</div>

<script>
// API
const ably = new Ably.Realtime("JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY");

let channel;
let roomCode="";
let players={};
let myId="p"+Math.random();
let myName="";
let timer=0;
let interval;

// 接続状態
ably.connection.on(s=>{
  status.innerText = s.current==="connected"?"接続OK":"切断";
  status.className = s.current==="connected"?"connected":"disconnected";
});

// 🔑 ランダムコード生成
function generateCode(){
  return Math.random().toString(36).substring(2,7).toUpperCase();
}

// ホスト
function createRoom(){
  roomCode = generateCode();
  connectRoom();
  roomDisplay.innerHTML = "ルームコード: <b>"+roomCode+"</b>";
  hostUI.style.display="block";
}

// 参加UI
function joinUI(){
  roomBox.style.display="block";
}

// 入室
function joinRoom(){
  roomCode = roomInput.value.toUpperCase();
  connectRoom();
}

// 接続
function connectRoom(){
  channel = ably.channels.get("tosochu-"+roomCode);

  channel.subscribe("update",msg=>{
    let d=msg.data;

    if(d.type==="timer"){
      timer=d.timer;
      updateTimer();
    }

    if(d.type==="players"){
      players=d.players;
      updateCount();
    }

    if(d.type==="log"){
      addLog("💬 "+d.text);
    }

    if(d.type==="capture"){
      addLog("🚨確保: "+d.name);
    }

    if(d.type==="revive"){
      addLog("✨復活: "+d.name);
    }

    if(d.type==="end"){
      showResult(d.players);
    }
  });

  nameBox.style.display="block";
  playerUI.style.display="block";
}

// 名前
function setName(){
  myName=nameInput.value||myId;
  players[myId]={alive:true,name:myName};
  sendState();
  addLog("参加: "+myName);
}

// タイマー
function startGame(){
  timer=parseInt(timeInput.value)||60;
  interval=setInterval(()=>{
    timer--;
    updateTimer();
    send({type:"timer",timer});

    if(timer<=0){
      clearInterval(interval);
      send({type:"end",players});
    }
  },1000);
}

function updateTimer(){
  let m=Math.floor(timer/60);
  let s=timer%60;
  timerEl.innerText=m+":"+String(s).padStart(2,"0");
}

// プレイヤー
function capture(){
  players[myId].alive=false;
  send({type:"capture",name:myName});
  sendState();
}

function revive(){
  players[myId].alive=true;
  send({type:"revive",name:myName});
  sendState();
}

// ログ
function sendLog(){
  let t=logInput.value;
  if(!t) return;
  send({type:"log",text:t});
  logInput.value="";
}

// 通信
function sendState(){
  send({type:"players",players});
}
function send(d){
  channel.publish("update",d);
}

// 人数
function updateCount(){
  let alive=Object.values(players).filter(p=>p.alive).length;
  count.innerText="残り人数: "+alive;
}

// ログ表示
function addLog(t){
  log.innerHTML+="<div>"+t+"</div>";
  log.scrollTop=log.scrollHeight;
}

// 結果
function showResult(p){
  let w=Object.values(p).filter(x=>x.alive).map(x=>x.name);
  addLog("🏆逃走成功: "+(w.join(", ")||"なし"));
}
</script>

</body>
</html>
