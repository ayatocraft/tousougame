<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexis Escape COMPLETE</title>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#0f172a;color:white;}
.center{display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;}
.card{background:#1e293b;border-radius:16px;padding:15px;margin:10px;}
button{background:#3b82f6;border:none;padding:10px;border-radius:10px;color:white;}
input{padding:10px;border-radius:10px;border:none;width:100%;}
#timer{font-size:60px;text-align:center;}
.player{display:flex;justify-content:space-between;padding:5px;border-bottom:1px solid #333;}
.alive{color:#22c55e;} .dead{color:#ef4444;}
#log{height:150px;overflow:auto;font-size:13px;}
#result{font-size:18px;color:#facc15;}
</style>
</head>

<body>

<div id="start" class="center">
  <h1>🏃 Nexis Escape COMPLETE</h1>
  <button onclick="createRoom()">ルーム作成</button>
</div>

<div id="nameUI" class="center" style="display:none;">
  <h2>名前入力</h2>
  <input id="nameInput">
  <button onclick="join()">参加</button>
</div>

<div id="main" style="display:none;">

<div class="card">
  <div id="timer">--:--</div>
  <div id="result"></div>
</div>

<div id="hostUI" class="card" style="display:none;">
  <h3>ゲームマスター</h3>
  <input id="timeInput" type="number" placeholder="秒">
  <button onclick="startGame()">開始</button>

  <hr>
  <input id="gmLogInput" placeholder="GMログ">
  <button onclick="sendGMLog()">送信</button>

  <div id="url"></div>
</div>

<div class="card">
  <button onclick="reqCapture()">確保</button>
  <button onclick="reqRevive()">復活</button>
</div>

<div class="card">
  <h3>参加者</h3>
  <div id="players"></div>
</div>

<div class="card">
  <h3>ログ</h3>
  <div id="log"></div>
</div>

</div>

<script>
const ably = new Ably.Realtime({
  key:"JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY",
  recover:true
});

let room = new URLSearchParams(location.search).get("room");
let isHost=false;
let myId=Math.random().toString(36).slice(2);
let myName="";
let channel;

let state={
  timer:0,
  players:{},
  log:[],
  ended:false
};

// ルーム作成
function createRoom(){
  room=Math.random().toString(36).substring(2,7).toUpperCase();
  isHost=true;
  history.replaceState({}, "", "?room="+room);

  start.style.display="none";
  nameUI.style.display="flex";

  setTimeout(()=> url.innerText=location.href,100);
}

// URL参加
if(room){
  start.style.display="none";
  nameUI.style.display="flex";
}

// 接続
function connect(){
  channel=ably.channels.get("complete-"+room);

  channel.subscribe(msg=>{
    let d=msg.data;

    if(isHost && d.type==="action"){
      handleAction(d);
    }

    if(d.type==="state"){
      state=d.state;
      render();
    }

    if(isHost && d.type==="syncRequest"){
      broadcast();
    }
  });
}

// 参加
function join(){
  myName=nameInput.value||"名無し";
  connect();

  nameUI.style.display="none";
  main.style.display="block";
  if(isHost) hostUI.style.display="block";

  send({type:"action",action:"join",id:myId,name:myName});
  send({type:"syncRequest"});
}

// ホスト処理
function handleAction(d){

  if(d.action==="join"){
    state.players[d.id]={name:d.name,alive:true};
    addLog("参加: "+d.name);
  }

  if(d.action==="capture"){
    if(state.players[d.id]){
      state.players[d.id].alive=false;
      addLog("🚨確保: "+state.players[d.id].name);
    }
  }

  if(d.action==="revive"){
    if(state.players[d.id]){
      state.players[d.id].alive=true;
      addLog("✨復活: "+state.players[d.id].name);
    }
  }

  broadcast();
}

// タイマー開始
function startGame(){
  if(!isHost) return;

  state.timer=parseInt(timeInput.value)||60;
  state.ended=false;

  let int=setInterval(()=>{
    state.timer--;

    if(state.timer<=0){
      clearInterval(int);
      endGame();
    }

    broadcast();
  },1000);
}

// 終了処理
function endGame(){
  state.ended=true;

  let survivors = Object.values(state.players)
    .filter(p=>p.alive)
    .map(p=>p.name);

  let text = survivors.length
    ? "🏆逃走成功: "+survivors.join(", ")
    : "💀全滅";

  addLog(text);
  broadcast();
}

// GMログ
function sendGMLog(){
  let t=gmLogInput.value;
  if(!t) return;
  addLog("📢 "+t);
  gmLogInput.value="";
  broadcast();
}

// 描画
function render(){
  let m=Math.floor(state.timer/60);
  let s=state.timer%60;
  timer.innerText=m+":"+String(s).padStart(2,"0");

  players.innerHTML="";
  for(let id in state.players){
    let p=state.players[id];
    players.innerHTML+=`
      <div class="player">
        <span>${p.name}</span>
        <span class="${p.alive?'alive':'dead'}">
          ${p.alive?'逃走中':'確保'}
        </span>
      </div>
    `;
  }

  log.innerHTML=state.log.map(x=>"<div>"+x+"</div>").join("");

  if(state.ended){
    let alive = Object.values(state.players).filter(p=>p.alive);
    result.innerText = alive.length
      ? "🏆逃走成功: "+alive.map(p=>p.name).join(", ")
      : "💀全滅";
  }
}

// ログ
function addLog(t){
  state.log.push(t);
  if(state.log.length>100) state.log.shift();
}

// 通信
function broadcast(){
  channel.publish("msg",{type:"state",state});
}
function send(d){
  channel.publish("msg",d);
}

// 操作
function reqCapture(){
  send({type:"action",action:"capture",id:myId});
}
function reqRevive(){
  send({type:"action",action:"revive",id:myId});
}
</script>

</body>
</html>
