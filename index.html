<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexis Escape FINAL</title>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#0f172a;color:white;}
.center{display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;}
.card{background:#1e293b;border-radius:16px;padding:15px;margin:10px;}
button{background:#3b82f6;border:none;padding:10px;border-radius:10px;color:white;}
input{padding:10px;border-radius:10px;border:none;}
#timer{font-size:60px;}
.player{display:flex;justify-content:space-between;border-bottom:1px solid #333;padding:5px;}
.alive{color:#22c55e;} .dead{color:#ef4444;}
#log{height:120px;overflow:auto;font-size:13px;}
</style>
</head>

<body>

<!-- 起動 -->
<div id="start" class="center">
  <h1>🏃 Nexis Escape FINAL</h1>
  <button onclick="createRoom()">ルーム作成</button>
</div>

<!-- 名前 -->
<div id="nameUI" class="center" style="display:none;">
  <h2>名前</h2>
  <input id="nameInput">
  <button onclick="join()">参加</button>
</div>

<!-- メイン -->
<div id="main" style="display:none;">

<div class="card">
  <div id="timer">--:--</div>
</div>

<div id="hostUI" class="card" style="display:none;">
  <input id="timeInput" type="number" placeholder="秒">
  <button onclick="startGame()">開始</button>
  <div id="url"></div>
</div>

<div class="card">
  <button onclick="reqCapture()">確保</button>
  <button onclick="reqRevive()">復活</button>
</div>

<div class="card">
  <h3>参加者</h3>
  <div id="players"></div>
</div>

<div class="card">
  <h3>ログ</h3>
  <div id="log"></div>
</div>

</div>

<script>
const ably = new Ably.Realtime({
  key:"JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY",
  recover:true
});

let room = new URLSearchParams(location.search).get("room");
let isHost=false;
let myId=Math.random().toString(36).slice(2);
let myName="";
let channel;

// 👑 状態（ホストのみ更新）
let state={
  timer:0,
  players:{},
  log:[]
};

// ルーム作成
function createRoom(){
  room=Math.random().toString(36).substring(2,7).toUpperCase();
  isHost=true;
  history.replaceState({}, "", "?room="+room);

  start.style.display="none";
  nameUI.style.display="flex";

  setTimeout(()=>{
    url.innerText=location.href;
  },100);
}

// URL参加
if(room){
  start.style.display="none";
  nameUI.style.display="flex";
}

// 接続
function connect(){
  channel=ably.channels.get("final-"+room);

  channel.subscribe(msg=>{
    let d=msg.data;

    // 👤 プレイヤー操作要求
    if(isHost && d.type==="action"){
      handleAction(d);
    }

    // 📡 状態受信
    if(d.type==="state"){
      state=d.state;
      render();
    }
  });
}

// 参加
function join(){
  myName=nameInput.value||"名無し";
  connect();

  nameUI.style.display="none";
  main.style.display="block";

  if(isHost) hostUI.style.display="block";

  // 参加要求
  send({type:"action",action:"join",id:myId,name:myName});
}

// 👑 ホスト処理
function handleAction(d){

  if(d.action==="join"){
    state.players[d.id]={name:d.name,alive:true};
    addLog("参加: "+d.name);
  }

  if(d.action==="capture"){
    state.players[d.id].alive=false;
    addLog("確保: "+state.players[d.id].name);
  }

  if(d.action==="revive"){
    state.players[d.id].alive=true;
    addLog("復活: "+state.players[d.id].name);
  }

  broadcast();
}

// タイマー開始
function startGame(){
  if(!isHost) return;

  state.timer=parseInt(timeInput.value)||60;

  let int=setInterval(()=>{
    state.timer--;
    broadcast();

    if(state.timer<=0){
      addLog("終了");
      clearInterval(int);
    }
  },1000);
}

// 描画
function render(){
  let m=Math.floor(state.timer/60);
  let s=state.timer%60;
  timer.innerText=m+":"+String(s).padStart(2,"0");

  // プレイヤー
  players.innerHTML="";
  for(let id in state.players){
    let p=state.players[id];
    players.innerHTML+=`
      <div class="player">
        <span>${p.name}</span>
        <span class="${p.alive?'alive':'dead'}">
          ${p.alive?'逃走中':'確保'}
        </span>
      </div>
    `;
  }

  // ログ
  log.innerHTML=state.log.map(x=>"<div>"+x+"</div>").join("");
}

// ログ追加
function addLog(t){
  state.log.push(t);
  if(state.log.length>50) state.log.shift();
}

// 📡 配信
function broadcast(){
  channel.publish("msg",{type:"state",state});
}

// 👤 リクエスト
function reqCapture(){
  send({type:"action",action:"capture",id:myId});
}
function reqRevive(){
  send({type:"action",action:"revive",id:myId});
}

// 送信
function send(d){
  channel.publish("msg",d);
}
</script>

</body>
</html>
