<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>逃走中 Nexis</title>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:white;
  text-align:center;
}
#status{
  position:fixed;
  top:10px;
  right:10px;
  padding:8px;
  border-radius:8px;
}
.connected{background:green;}
.disconnected{background:red;}
#log{
  height:150px;
  overflow:auto;
  border:1px solid #555;
}
button{padding:10px;margin:5px;}
</style>
</head>
<body>

<h2 id="status">接続中...</h2>

<h1 id="timer">--:--</h1>
<h3 id="count">残り人数: 0</h3>

<div id="log"></div>

<hr>

<button onclick="setMode('host')">ホスト</button>
<button onclick="setMode('player')">参加者</button>

<div id="nameBox" style="display:none;">
  <input id="nameInput" placeholder="名前">
  <button onclick="setName()">決定</button>
</div>

<div id="hostUI" style="display:none;">
  <input id="timeInput" type="number" placeholder="秒">
  <button onclick="startGame()">開始</button>
</div>

<div id="playerUI" style="display:none;">
  <button onclick="capture()">確保</button>
  <button onclick="revive()">復活</button>
</div>

<script>
// ★あなたのAPIキー
const ably = new Ably.Realtime("JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY");
const channel = ably.channels.get("tosochu");

// 接続状態
ably.connection.on(state=>{
  let el = document.getElementById("status");
  if(state.current==="connected"){
    el.innerText="接続OK";
    el.className="connected";
  }else{
    el.innerText="切断";
    el.className="disconnected";
  }
});

// 状態
let players = {};
let myId = "p"+Math.random();
let myName="";
let timer=0;
let interval;
let mode="";

// モード
function setMode(m){
  mode=m;
  document.getElementById("hostUI").style.display = m==="host"?"block":"none";
  document.getElementById("playerUI").style.display = m==="player"?"block":"none";

  if(m==="player"){
    document.getElementById("nameBox").style.display="block";
  }
}

// 名前
function setName(){
  myName = document.getElementById("nameInput").value || myId;
  players[myId] = {alive:true,name:myName};
  sendState();
  log("参加: "+myName);
}

// タイマー
function startGame(){
  timer = parseInt(document.getElementById("timeInput").value) || 60;
  interval = setInterval(()=>{
    timer--;
    updateTimer();
    broadcast({type:"timer",timer});

    if(timer<=0){
      clearInterval(interval);
      broadcast({type:"end",players});
    }
  },1000);
}

function updateTimer(){
  let m=Math.floor(timer/60);
  let s=timer%60;
  document.getElementById("timer").innerText =
    m+":"+String(s).padStart(2,"0");
}

// プレイヤー
function capture(){
  if(players[myId]){
    players[myId].alive=false;
    sendState();
  }
}

function revive(){
  if(players[myId]){
    players[myId].alive=true;
    sendState();
  }
}

// 通信
function sendState(){
  broadcast({type:"players",players});
}

function broadcast(d){
  channel.publish("update",d);
}

// 受信
channel.subscribe("update",msg=>{
  let d = msg.data;

  if(d.type==="timer"){
    timer=d.timer;
    updateTimer();
  }

  if(d.type==="players"){
    players=d.players;
    updateCount();
  }

  if(d.type==="end"){
    players=d.players;
    showResult();
  }
});

// 人数
function updateCount(){
  let alive = Object.values(players).filter(p=>p.alive).length;
  document.getElementById("count").innerText =
    "残り人数: "+alive;
}

// ログ
function log(t){
  let el = document.getElementById("log");
  el.innerHTML += "<div>"+t+"</div>";
}

// 結果
function showResult(){
  let w = Object.values(players)
    .filter(p=>p.alive)
    .map(p=>p.name);

  log("🏆逃走成功: "+(w.join(", ")||"なし"));
}
</script>

</body>
</html>
