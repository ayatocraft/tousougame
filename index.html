<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexis Escape v2</title>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0f172a;
  color:white;
}

/* Nexisカード */
.card{
  background:#1e293b;
  border-radius:16px;
  padding:15px;
  margin:10px;
}

/* センター */
.center{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

/* UI */
button{
  background:#3b82f6;
  border:none;
  padding:10px;
  border-radius:10px;
  color:white;
}
input{
  padding:10px;
  border-radius:10px;
  border:none;
}

#timer{ font-size:50px; }

/* プレイヤー */
.player{
  display:flex;
  justify-content:space-between;
  padding:5px;
  border-bottom:1px solid #333;
}
.alive{color:#22c55e;}
.dead{color:#ef4444;}
</style>
</head>

<body>

<!-- 起動 -->
<div id="start" class="center">
  <h1>🏃 Nexis Escape</h1>
  <button onclick="createRoom()">ルーム作成</button>
</div>

<!-- 名前 -->
<div id="nameUI" class="center" style="display:none;">
  <h2>名前入力</h2>
  <input id="nameInput">
  <button onclick="join()">参加</button>
</div>

<!-- メイン -->
<div id="main" style="display:none;">

  <div class="card">
    <div id="timer">--:--</div>
  </div>

  <!-- ホストUI -->
  <div id="hostUI" class="card" style="display:none;">
    <h3>ホスト操作</h3>
    <input id="timeInput" type="number" placeholder="秒">
    <button onclick="startGame()">開始</button>
    <div id="roomURL"></div>
  </div>

  <!-- 操作 -->
  <div class="card">
    <button onclick="capture()">確保</button>
    <button onclick="revive()">復活</button>
  </div>

  <!-- プレイヤー -->
  <div class="card">
    <h3>参加者</h3>
    <div id="playerList"></div>
  </div>

</div>

<script>
const ably = new Ably.Realtime({
  key:"JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY",
  recover:true
});

let room = new URLSearchParams(location.search).get("room");
let isHost = false;
let channel;
let players = {};
let state = {timer:0};
let myId = Math.random().toString(36).slice(2);
let myName="";

// ルーム作成
function createRoom(){
  room = Math.random().toString(36).substring(2,7).toUpperCase();
  isHost = true;

  let url = location.origin + location.pathname + "?room="+room;
  history.replaceState({}, "", "?room="+room);

  start.style.display="none";
  nameUI.style.display="flex";

  setTimeout(()=>{
    roomURL.innerHTML="共有URL:<br>"+url;
  },100);
}

// URL参加
if(room){
  start.style.display="none";
  nameUI.style.display="flex";
}

// 接続
function connect(){
  channel = ably.channels.get("room-"+room);

  channel.subscribe(msg=>{
    let d = msg.data;

    if(d.type==="players"){
      players = d.players;
      updatePlayers();
    }

    if(d.type==="state"){
      state = d.state;
      updateTimer();
    }
  });
}

// 名前決定
function join(){
  myName = nameInput.value || "名無し";

  connect();

  players[myId] = {name:myName,alive:true};
  sendPlayers();

  nameUI.style.display="none";
  main.style.display="block";

  if(isHost){
    hostUI.style.display="block";
  }
}

// タイマー開始（ホストのみ）
function startGame(){
  if(!isHost) return;

  state.timer = parseInt(timeInput.value) || 60;

  let interval = setInterval(()=>{
    state.timer--;
    sendState();

    if(state.timer<=0){
      clearInterval(interval);
    }
  },1000);
}

// UI更新
function updateTimer(){
  let m = Math.floor(state.timer/60);
  let s = state.timer%60;
  timer.innerText = m+":"+String(s).padStart(2,"0");
}

// プレイヤー表示
function updatePlayers(){
  playerList.innerHTML="";

  for(let id in players){
    let p = players[id];

    let div = document.createElement("div");
    div.className="player";

    div.innerHTML = `
      <span>${p.name}</span>
      <span class="${p.alive?'alive':'dead'}">
        ${p.alive?'逃走中':'確保'}
      </span>
    `;

    playerList.appendChild(div);
  }
}

// 確保・復活
function capture(){
  players[myId].alive=false;
  sendPlayers();
}
function revive(){
  players[myId].alive=true;
  sendPlayers();
}

// 送信
function sendPlayers(){
  channel.publish("msg",{type:"players",players});
}
function sendState(){
  channel.publish("msg",{type:"state",state});
}
</script>

</body>
</html>
