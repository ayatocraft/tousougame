<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexis Escape</title>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#0f172a;
  color:white;
}

/* NexisカードUI */
.card{
  background:#1e293b;
  border-radius:16px;
  padding:20px;
  margin:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* センター */
.center{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

/* ボタン */
button{
  background:#3b82f6;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  color:white;
  font-size:16px;
}

/* 入力 */
input{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

/* タイマー */
#timer{
  font-size:64px;
  font-weight:bold;
}

/* ログ */
#log{
  height:150px;
  overflow:auto;
  font-size:14px;
}

/* バッジ */
.badge{
  padding:6px 10px;
  border-radius:10px;
  background:#22c55e;
}
.dead{ background:#ef4444; }
</style>
</head>

<body>

<!-- 起動画面 -->
<div id="start" class="center">
  <h1>🏃 Nexis Escape</h1>
  <button onclick="createRoom()">ルーム作成</button>
</div>

<!-- 名前入力 -->
<div id="nameUI" class="center" style="display:none;">
  <h2>名前入力</h2>
  <input id="nameInput" placeholder="名前">
  <button onclick="join()">参加</button>
</div>

<!-- メイン -->
<div id="main" style="display:none;">
  <div class="card">
    <div id="timer">--:--</div>
    <div id="count">人数: 0</div>
  </div>

  <div class="card">
    <button onclick="capture()">確保</button>
    <button onclick="revive()">復活</button>
  </div>

  <div class="card">
    <input id="msg" placeholder="ログ">
    <button onclick="sendLog()">送信</button>
    <div id="log"></div>
  </div>
</div>

<script>
const ably = new Ably.Realtime({
  key:"JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY",
  recover:true
});

let channel;
let room = new URLSearchParams(location.search).get("room");
let isHost = false;
let players = {};
let state = {timer:0,end:false};
let myId = Math.random().toString(36).slice(2);
let myName="";

// 自動再接続ログ
ably.connection.on(s=>{
  console.log("接続:",s.current);
});

// ルーム作成
function createRoom(){
  room = Math.random().toString(36).substring(2,7).toUpperCase();
  isHost = true;

  // URL共有
  history.replaceState({}, "", "?room="+room);

  start.style.display="none";
  nameUI.style.display="flex";
}

// 参加
if(room){
  start.style.display="none";
  nameUI.style.display="flex";
}

// 接続
function connect(){
  channel = ably.channels.get("nexis-"+room);

  channel.subscribe(msg=>{
    let d = msg.data;

    if(d.type==="state"){
      state = d.state;
      updateUI();
    }

    if(d.type==="players"){
      players = d.players;
      updatePlayers();
    }

    if(d.type==="log"){
      addLog(d.text);
    }
  });
}

// 名前決定
function join(){
  myName = nameInput.value || "名無し";

  connect();

  players[myId] = {name:myName,alive:true};
  sendPlayers();

  nameUI.style.display="none";
  main.style.display="block";

  if(isHost){
    startTimer(60);
  }
}

// タイマー（ホストのみ）
function startTimer(sec){
  state.timer = sec;

  setInterval(()=>{
    state.timer--;

    sendState();

    if(state.timer<=0){
      state.end = true;
      sendState();
    }
  },1000);
}

// UI更新
function updateUI(){
  let m = Math.floor(state.timer/60);
  let s = state.timer%60;
  timer.innerText = m+":"+String(s).padStart(2,"0");
}

// プレイヤー更新
function updatePlayers(){
  let alive = Object.values(players).filter(p=>p.alive).length;
  count.innerText="人数: "+alive;
}

// 確保
function capture(){
  players[myId].alive=false;
  sendPlayers();
}

// 復活
function revive(){
  players[myId].alive=true;
  sendPlayers();
}

// ログ
function sendLog(){
  channel.publish("msg",{type:"log",text:myName+": "+msg.value});
  msg.value="";
}
function addLog(t){
  log.innerHTML+="<div>"+t+"</div>";
}

// 送信
function sendState(){
  channel.publish("msg",{type:"state",state});
}
function sendPlayers(){
  channel.publish("msg",{type:"players",players});
}
</script>

</body>
</html>
